# Compared to root/docker-compose.yml, this docker compose file builds each service locally
# Ideal for development

name: weather-station-local-build

networks:
  internal:
    driver: bridge

volumes:
  cosmos-data:
  postgres-data:
  keycloak-data:
  azurite-data:

services:
  setup:
    build:
      context: ./setup
    container_name: setup
    networks: [internal]
    volumes:
      - ./keys:/keys:ro
      - .:/output
    environment:
      JWT_ISSUER: ${JWT_ISSUER_PROVISIONING}
      JWT_KID: ${JWT_KID_PROVISIONING}
      JWT_AUDIENCE: ${JWT_AUDIENCE_PROVISIONING}
      CLAIM_BASE_URL: ${CLAIM_BASE_URL}
      DEVICE_COUNT: ${DEVICE_COUNT}

  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-EN20260331
    container_name: cosmos-emulator
    hostname: cosmos-emulator
    networks: [internal]
    ports:
      - "8081:8081"
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 3
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: "cosmos-emulator"
    volumes:
      - cosmos-data:/tmp/cosmos/appdata
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8081/"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  cosmos-init:
    build:
      context: ./cosmos-init
    container_name: cosmos-init
    networks: [internal]
    depends_on:
      cosmos:
        condition: service_healthy
    environment:
      COSMOS_ENDPOINT: ${COSMOS_ENDPOINT}
      COSMOS_KEY: ${COSMOS_KEY}
      COSMOS_DATABASE: ${COSMOS_DATABASE}

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    networks: [internal]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: keycloak
    command: start-dev --health-enabled=true
    networks: [internal]
    ports:
      - "8083:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    networks: [internal]
    volumes:
      - azurite-data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          node -e "
            const c = require('net').connect(10000, 'localhost', () => { c.end(); process.exit(0); });
            c.on('error', () => process.exit(1));
            setTimeout(() => process.exit(1), 3000);
          "
      interval: 5s
      retries: 10
      start_period: 10s

  provisioning-function:
    build:
      context: ../provisioning-service
    container_name: provisioning-function
    networks: [internal]
    depends_on:
      cosmos:
        condition: service_healthy
      cosmos-init:
        condition: service_completed_successfully
      setup:
        condition: service_completed_successfully
    volumes:
      - ./keys:/keys:ro
    environment:
      COSMOS_ENDPOINT: ${COSMOS_ENDPOINT}
      COSMOS_KEY: ${COSMOS_KEY}
      COSMOS_DATABASE: ${COSMOS_DATABASE}
      COSMOS_CONTAINER: ${COSMOS_CONTAINER_REGISTRY}
      COSMOS_TLS_INSECURE: ${COSMOS_TLS_INSECURE}
      JWT_ISSUER: ${JWT_ISSUER_DEVICE}
      ACCESS_TOKEN_PRIVATE_KEY_PATH: "/keys/private.pem"
      SERVER_PORT: "8080"
      ENVIRONMENT: development

  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: server
    networks: [internal]
    ports:
      - "7071:80"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PortainerConnection: >-
        Host=postgres:5432;
        Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};
        Password=${POSTGRES_PASSWORD}
      Keycloak__Authority: "http://keycloak:8080/realms/${KEYCLOAK_REALM}"
      CosmosDb__ConnectionString: >-
        AccountEndpoint=${COSMOS_ENDPOINT};AccountKey=${COSMOS_KEY}
      CosmosDb__DatabaseName: ${COSMOS_DATABASE}
      CosmosDb__ViewsContainerName: ${COSMOS_CONTAINER_VIEWS}
      COSMOS_TLS_INSECURE: ${COSMOS_TLS_INSECURE}
      AuthService__BaseUrl: "http://provisioning-function:8080/api/v1/devices/"
      AuthService__SharedSecret: ${WORKER_SHARED_SECRET}
      AdminApiKey__ApiKey: ${ADMIN_API_KEY}

  telemetry-worker:
    build:
      context: ..
      dockerfile: telemetry-worker/Worker/Dockerfile
    container_name: telemetry-worker
    networks: [internal]
    depends_on:
      cosmos:
        condition: service_healthy
      cosmos-init:
        condition: service_completed_successfully
      azurite:
        condition: service_healthy
    environment:
      FUNCTIONS_WORKER_RUNTIME: dotnet-isolated
      AzureWebJobsStorage: >-
        DefaultEndpointsProtocol=http;
        AccountName=${AZURITE_ACCOUNT};
        AccountKey=${AZURITE_KEY};
        BlobEndpoint=http://azurite:10000/${AZURITE_ACCOUNT};
        QueueEndpoint=http://azurite:10001/${AZURITE_ACCOUNT};
        TableEndpoint=http://azurite:10002/${AZURITE_ACCOUNT};
      COSMOS_CONNECTION: >-
        AccountEndpoint=${COSMOS_ENDPOINT};AccountKey=${COSMOS_KEY}
      COSMOS_DATABASE: ${COSMOS_DATABASE}
      COSMOS_CONTAINER: ${COSMOS_CONTAINER_REGISTRY}
      COSMOS_VIEWS_CONTAINER: ${COSMOS_CONTAINER_VIEWS}
      COSMOS_TELEMETRY_CONTAINER: ${COSMOS_CONTAINER_TELEMETRY}
      COSMOS_TLS_INSECURE: ${COSMOS_TLS_INSECURE}

  gateway:
    build:
      context: ./gateway
    container_name: gateway
    networks: [internal]
    ports:
      - "8000:8000"
    depends_on:
      setup:
        condition: service_completed_successfully
      telemetry-worker:
        condition: service_started
      provisioning-function:
        condition: service_started
    volumes:
      - ./keys:/keys:ro
    environment:
      DEVICE_PUB_KEY_PATH: /keys/public.pem
      PROVISIONING_PUB_KEY_PATH: /keys/provisioning-public.pem
      DEVICE_ISSUER: ${JWT_ISSUER_DEVICE}
      PROVISIONING_ISSUER: ${JWT_ISSUER_PROVISIONING}
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET}
      MAIN_FN_URL: "http://telemetry-worker:80"
      PROVISIONING_FN_URL: "http://provisioning-function:8080"
