name: Docker Publish
description: Builds a multi-arch image, pushes it to Docker Hub and GHCR, then scans with Trivy

inputs:
  image-name:
    required: true
  context:
    required: true
  dockerfile:
    description: path to the Dockerfile.
    required: true
  build-args:
    required: false
    default: ""
  platforms:
    required: false
    default: "linux/amd64,linux/arm64"
  tag-prefix:
    description: git tag prefix to strip when deriving the semver version (e.g. server-v).
    required: false
    default: "v"
  github-token:
    description: GITHUB_TOKEN for ghcr.io.
    required: true
  dockerhub-username:
    description: Docker Hub username.
    required: true
  dockerhub-token:
    description: Docker Hub access token.
    required: true
  trivy-config:
    required: false
    default: "trivy.yaml"
  trivy-category:
    required: true

outputs:
  ghcr-image:
    value: ${{ steps.build.outputs.imageid }}
  version:
    value: ${{ steps.meta.outputs.version }}

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}

    - name: Resolve image refs
      id: refs
      shell: bash
      run: |
        REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        echo "ghcr=ghcr.io/${REPO_LC}/${{ inputs.image-name }}" >> "$GITHUB_OUTPUT"
        echo "dh=${{ inputs.dockerhub-username }}/${{ inputs.image-name }}" >> "$GITHUB_OUTPUT"

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          ${{ steps.refs.outputs.ghcr }}
          ${{ steps.refs.outputs.dh }}
        tags: |
          type=semver,pattern={{version}},prefix=${{ inputs.tag-prefix }},enable=${{ github.ref_type == 'tag' }}
          type=semver,pattern={{major}}.{{minor}},prefix=${{ inputs.tag-prefix }},enable=${{ github.ref_type == 'tag' }}
          type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
          type=sha,prefix=main-,enable=${{ github.ref_type != 'tag' }}
        labels: |
          org.opencontainers.image.vendor=${{ github.repository_owner }}

    - name: Build and push
      id: build
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: ${{ inputs.platforms }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha,scope=${{ inputs.image-name }}
        cache-to: type=gha,mode=max,scope=${{ inputs.image-name }}
        provenance: true
        sbom: true

    - name: Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.refs.outputs.ghcr }}:${{ steps.meta.outputs.version }}
        format: "sarif"
        output: "trivy-results.sarif"
        trivy-config: ${{ inputs.trivy-config }}

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: "trivy-results.sarif"
        category: ${{ inputs.trivy-category }}
