name: weather-station-local

networks:
  internal:

volumes:
  cosmos-data:
  postgres-data:
  keycloak-data:
  azurite-data:
  keys-data:

services:
  setup:
    image: ghcr.io/mkkl1/weather-station/hw-setup@sha256:c95efea014ffeb817fb6421c90b00e1e6e521701b6da8b9ce89348af0fd5accb
    networks: [internal]
    volumes:
      - keys-data:/keys:ro
      - ${SETUP_OUTPUT_DIR}:/output
    environment:
      JWT_ISSUER: ${JWT_ISSUER_PROVISIONING}
      JWT_KID: ${JWT_KID_PROVISIONING}
      JWT_AUDIENCE: ${JWT_AUDIENCE_PROVISIONING}
      CLAIM_BASE_URL: ${CLAIM_BASE_URL}
      DEVICE_COUNT: ${DEVICE_COUNT}

  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-EN20260331
    networks: [internal]
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 3
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: "cosmos-emulator"
    volumes:
      - cosmos-data:/tmp/cosmos/appdata
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8081/"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  cosmos-init:
    image: ghcr.io/mkkl1/weather-station/hw-cosmos-init@sha256:c183a11103b0438be5b5ac902a572fc9c2e6f64aad6e57929d41f53e04c0a993
    networks: [internal]
    depends_on:
      cosmos-emulator:
        condition: service_healthy
    environment:
      COSMOS_ENDPOINT: ${COSMOS_ENDPOINT}
      COSMOS_KEY: ${COSMOS_KEY}
      COSMOS_DATABASE: ${COSMOS_DATABASE}

  postgres:
    image: postgres:18-alpine
    networks: [internal]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    command: start-dev --health-enabled=true
    networks: [internal]
    ports:
      - "8001:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    networks: [internal]
    volumes:
      - azurite-data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10000"]
      interval: 5s
      retries: 10
      start_period: 10s

  provisioning-function:
    image: ghcr.io/mkkl1/weather-station/hw-provisioning-service@sha256:df7f6f51241e21c90a76c2176c2755f1b627c6c99ae1a35366fcdbbef05a87f0
    networks: [internal]
    depends_on:
      cosmos-emulator:
        condition: service_healthy
      cosmos-init:
        condition: service_completed_successfully
      setup:
        condition: service_completed_successfully
    volumes:
      - keys-data:/keys:ro
    environment:
      COSMOS_ENDPOINT: ${COSMOS_ENDPOINT}
      COSMOS_KEY: ${COSMOS_KEY}
      COSMOS_DATABASE: ${COSMOS_DATABASE}
      COSMOS_CONTAINER: ${COSMOS_CONTAINER_REGISTRY}
      COSMOS_TLS_INSECURE: ${COSMOS_TLS_INSECURE}
      JWT_ISSUER: ${JWT_ISSUER_DEVICE}
      ACCESS_TOKEN_PRIVATE_KEY_PATH: "/keys/private.pem"
      SERVER_PORT: "8080"
      ENVIRONMENT: development

  server:
    image: ghcr.io/mkkl1/weather-station/hw-server@sha256:64fc380a3c7eb25f66073d1c3b983201597fe2a7e7d5b21d0fe3bc5fc525e244
    networks: [internal]
    ports:
      - "8002:80"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PortainerConnection: >-
        Host=postgres:5432;
        Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};
        Password=${POSTGRES_PASSWORD}
      Keycloak__Authority: "http://keycloak:8080/realms/${KEYCLOAK_REALM}"
      CosmosDb__ConnectionString: >-
        AccountEndpoint=${COSMOS_ENDPOINT};AccountKey=${COSMOS_KEY}
      CosmosDb__DatabaseName: ${COSMOS_DATABASE}
      CosmosDb__ViewsContainerName: ${COSMOS_CONTAINER_VIEWS}
      COSMOS_TLS_INSECURE: ${COSMOS_TLS_INSECURE}
      AuthService__BaseUrl: "http://provisioning-function:8080/api/v1/devices/"
      AuthService__SharedSecret: ${WORKER_SHARED_SECRET}
      AdminApiKey__ApiKey: ${ADMIN_API_KEY}

  telemetry-worker:
    image: ghcr.io/mkkl1/weather-station/hw-telemetry-worker@sha256:b8fe216344a2aaaa3da5b05e04e2d983e36291bf30a6bf58a9123985ceb0cb54
    networks: [internal]
    depends_on:
      cosmos-emulator:
        condition: service_healthy
      cosmos-init:
        condition: service_completed_successfully
      azurite:
        condition: service_healthy
    environment:
      FUNCTIONS_WORKER_RUNTIME: dotnet-isolated
      AzureWebJobsStorage: >-
        DefaultEndpointsProtocol=http;
        AccountName=${AZURITE_ACCOUNT};
        AccountKey=${AZURITE_KEY};
        BlobEndpoint=http://azurite:10000/${AZURITE_ACCOUNT};
        QueueEndpoint=http://azurite:10001/${AZURITE_ACCOUNT};
        TableEndpoint=http://azurite:10002/${AZURITE_ACCOUNT};
      COSMOS_CONNECTION: >-
        AccountEndpoint=${COSMOS_ENDPOINT};AccountKey=${COSMOS_KEY}
      COSMOS_DATABASE: ${COSMOS_DATABASE}
      COSMOS_CONTAINER: ${COSMOS_CONTAINER_REGISTRY}
      COSMOS_VIEWS_CONTAINER: ${COSMOS_CONTAINER_VIEWS}
      COSMOS_TELEMETRY_CONTAINER: ${COSMOS_CONTAINER_TELEMETRY}
      COSMOS_TLS_INSECURE: ${COSMOS_TLS_INSECURE}

  gateway:
    image: ghcr.io/mkkl1/weather-station/hw-gateway@sha256:192bea9d5a7095f152ac83ee31629dd8d75167f7a7e3200916d65918bbb80c3f
    networks: [internal]
    ports:
      - "8000:8000"
    volumes:
      - keys-data:/keys:ro
    environment:
      DEVICE_PUB_KEY_PATH: /keys/public.pem
      PROVISIONING_PUB_KEY_PATH: /keys/provisioning-public.pem
      DEVICE_ISSUER: ${JWT_ISSUER_DEVICE}
      PROVISIONING_ISSUER: ${JWT_ISSUER_PROVISIONING}
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET}
      MAIN_FN_URL: "http://telemetry-worker:80"
      PROVISIONING_FN_URL: "http://provisioning-function:8080"
