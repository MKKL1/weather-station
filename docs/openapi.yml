openapi: 3.0.3
info:
  title: Weather Station API
  description: |
    API for IoT weather station devices.

    ## Authentication

    | Scheme | Used for |
    |---|---|
    | `provisioningJwt` | Device registration, token refresh, and claim-code generation. Bearer JWT issued at device manufacture time. |
    | `deviceJwt` | Telemetry ingestion. Short-lived JWT obtained from the token endpoint. |
    | `serviceAuth` | Claiming a device on behalf of a user. Azure AD client-credentials flow. |
  version: 1.0.0
servers:
  - url: https://apim-weather-app-dev.azure-api.net
    description: Development

components:
  securitySchemes:
    provisioningJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

    deviceJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

    serviceAuth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://login.microsoftonline.com/{tenantId}/oauth2/v2.0/token
          scopes: {}

  parameters:
    deviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
      example: "H1-ABC"

  schemas:
    DeviceRegistration:
      type: object
      properties:
        status:
          type: string
          example: registered
        data:
          type: object
          properties:
            device_id:
              type: string
              example: "H1-ABC"
            hmac_secret:
              type: string
              description: Base64-encoded secret used to sign authentication challenges.
              example: "dGhpcyBpcyBhIHRlc3Qgc2VjcmV0IGtleQ=="

    AccessToken:
      type: object
      properties:
        status:
          type: string
          example: token_generated
        data:
          type: object
          properties:
            token:
              type: string
              example: header.payload.signature
            expires_in:
              type: integer
              description: Validity duration in seconds.
              example: 86400
            token_type:
              type: string
              example: Bearer

    ClaimCode:
      type: object
      properties:
        status:
          type: string
          example: claim_code_generated
        data:
          type: object
          properties:
            claim_code:
              type: string
              example: "A1B2C3"
            validity_seconds:
              type: integer
              example: 300

    DeviceClaim:
      type: object
      properties:
        status:
          type: string
          example: claimed
        data:
          type: object
          properties:
            device_id:
              type: string
              example: "H1-ABC"
            claimed_by_user_id:
              type: string
              example: "user-123"

    Error:
      type: object
      properties:
        status:
          type: string
          example: error
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - INVALID_REQUEST
                - DEVICE_NOT_FOUND
                - DEVICE_NOT_REGISTERED
                - DEVICE_ALREADY_CLAIMED
                - INVALID_CODE
                - INVALID_TIMESTAMP
                - INVALID_SIGNATURE
                - INTERNAL_ERROR
            message:
              type: string

    HmacChallenge:
      type: object
      required: [timestamp, signature]
      properties:
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp (seconds) of the request.
          example: 1763756825
        signature:
          type: string
          description: HMAC-SHA256 of `"{deviceId}:{timestamp}"` using `hmac_secret`.
          example: "c50c19d1cfe63cb95bb1bfa084db1307a32e3a55e51e2f451997352480151692"

    OwnershipClaim:
      type: object
      required: [claim_code, user_id]
      properties:
        claim_code:
          type: string
          description: Activation code displayed on the device.
          example: "A1B2C3"
        user_id:
          type: string
          example: "user-123"

    WeatherReading:
      type: object
      required: [ts, dat]
      properties:
        ts:
          type: integer
          format: int64
          description: Unix timestamp (seconds) when the reading was taken.
          example: 1763731390
        dat:
          $ref: "#/components/schemas/Measurement"

    Measurement:
      type: object
      properties:
        tmp:
          type: number
          format: float
          description: Ambient temperature (°C).
          example: 22.35
        prs:
          type: number
          format: float
          description: Atmospheric pressure (hPa).
          example: 1013.5
        hum:
          type: number
          format: float
          description: Relative humidity (0–100 %).
          example: 45.3
        mmpt:
          type: number
          format: float
          description: Instantaneous precipitation (mm).
          example: 0.2
        precipitation:
          $ref: "#/components/schemas/PrecipitationBuckets"

    PrecipitationBuckets:
      type: object
      description: Precipitation bucket tip data.
      properties:
        dat:
          type: object
          description: Sparse map of bucket index → tip count.
          additionalProperties:
            type: integer
          example: {"2": 1, "3": 5, "4": 2}
        sec:
          type: integer
          description: Bucket duration in seconds.
          example: 120
        sts:
          type: integer
          format: int64
          description: Start timestamp of the precipitation bins in unix seconds.
          example: 1763730780
        n:
          type: integer
          description: Number of buckets.
          example: 5

paths:
  /provisioning/{deviceId}/register:
    post:
      tags: [Provisioning]
      summary: Register Device
      description: >
        Registers a device and returns the HMAC secret used to sign future
        authentication challenges. Returns the existing secret
        if the device has already been registered.
      operationId: registerDevice
      security:
        - provisioningJwt: []
      parameters:
        - $ref: "#/components/parameters/deviceId"
      responses:
        "200":
          description: Device registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceRegistration"
        "401":
          description: Invalid or expired provisioning token.
        "403":
          description: Token does not belong to this device.

  /provisioning/{deviceId}/token:
    post:
      tags: [Provisioning]
      summary: Create Access Token
      description: >
        Exchanges a signed HMAC challenge for a short-lived access token.
        Sign (HMAC-SHA256) the string `"{deviceId}:{timestamp}"` with the `hmac_secret`
        obtained during registration and include the result as `signature`.
      operationId: createAccessToken
      security:
        - provisioningJwt: []
      parameters:
        - $ref: "#/components/parameters/deviceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HmacChallenge"
      responses:
        "200":
          description: Token issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessToken"
        "401":
          description: >
            Invalid provisioning token, HMAC signature mismatch (`INVALID_SIGNATURE`),
            or timestamp outside allowed drift (`INVALID_TIMESTAMP`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Token does not belong to this device.
        "404":
          description: >
            Device not found (`DEVICE_NOT_FOUND`) or not yet registered (`DEVICE_NOT_REGISTERED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /provisioning/{deviceId}/claim-code:
    post:
      tags: [Provisioning]
      summary: Create Claim Code
      description: >
        Generates a short-lived activation code. The device should display
        this code to the user so they can claim ownership via the client app.
      operationId: generateClaimCode
      security:
        - provisioningJwt: []
      parameters:
        - $ref: "#/components/parameters/deviceId"
      responses:
        "200":
          description: Claim code generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimCode"
        "401":
          description: Invalid or expired provisioning token.
        "403":
          description: Token does not belong to this device.
        "404":
          description: >
            Device not found (`DEVICE_NOT_FOUND`) or not yet registered (`DEVICE_NOT_REGISTERED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /provisioning/{deviceId}/claim:
    post:
      tags: [Provisioning]
      summary: Claim Device
      description: >
        Server-to-server endpoint called by a trusted backend service to associate
        a device with a user account. The backend should call this after the user
        submits the activation code shown on the device's display.
        Not intended to be called directly by devices or end users.
      operationId: claimDevice
      security:
        - serviceAuth: []
      parameters:
        - $ref: "#/components/parameters/deviceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OwnershipClaim"
      responses:
        "200":
          description: Device claimed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceClaim"
        "400":
          description: >
            Missing required fields (`INVALID_REQUEST`) or activation code
            is invalid or expired (`INVALID_CODE`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid Azure AD worker token.
        "404":
          description: Device not found (`DEVICE_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Device already claimed by a different user (`DEVICE_ALREADY_CLAIMED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /devices/{deviceId}/weather:
    post:
      tags: [Weather ingestion]
      summary: Submit Weather Reading
      description: Ingests a sensor reading from the weather station.
      operationId: submitWeatherReading
      security:
        - deviceJwt: []
      parameters:
        - $ref: "#/components/parameters/deviceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeatherReading"
      responses:
        "201":
          description: Reading accepted.
        "401":
          description: Invalid or expired device JWT.
